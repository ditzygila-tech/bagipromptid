
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - bagiprompt.id</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body class="body-auth">

  <div class="auth-wrapper">
    <a href="index.html" class="logo logo-auth">bagiprompt<span class="logo-accent">.id</span></a>
    
    <div class="glass-card auth-card">
      <h1 class="auth-title">Area Masuk Klien</h1>
      <p class="auth-subtitle">Silakan masuk untuk mengelola prompt Anda</p>
      
      <div id="errorMessage" class="alert-box alert-danger hidden"></div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail" class="form-label">Alamat Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="nama@email.com" required>
        </div>
        
        <div class="form-group">
          <div class="label-wrapper">
            <label for="loginPassword" class="form-label">Kata Sandi</label>
            <a href="forgot-password.html" class="auth-link">Lupa Kata Sandi?</a>
          </div>
          <div class="password-input-wrapper">
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
            <button type="button" class="password-toggle" id="passwordToggleBtn" aria-label="Tampilkan kata sandi">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <button type="submit" id="loginBtn" class="btn-primary btn-full">
          <span class="btn-text">Masuk</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <div class="auth-divider">
        <span>atau hubungkan lewat</span>
      </div>

      <div class="social-login-grid">
        <button type="button" id="googleLoginBtn" class="btn-social">
          Google
        </button>
        <button type="button" id="githubLoginBtn" class="btn-social">
          GitHub
        </button>
      </div>

      <p class="auth-footer-text">
        Belum punya akun? <a href="signup.html" class="auth-link-bold">Daftar sekarang</a>
      </p>
    </div>
  </div>

  <div id="toast" class="toast-notification">Pemberitahuan muncul di sini</div>

  <script src="script.js"></script>
</body>
</html>
