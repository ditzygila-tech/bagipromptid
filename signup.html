
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Akun Baru - bagiprompt.id</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="body-auth">

  <div class="auth-wrapper">
    <a href="index.html" class="logo logo-auth">bagiprompt<span class="logo-accent">.id</span></a>
    
    <div class="glass-card auth-card">
      <h1 class="auth-title">Daftar Akun Baru</h1>
      <p class="auth-subtitle">Gabung bersama komunitas kreator AI di Indonesia</p>
      
      <div id="errorMessage" class="alert-box alert-danger hidden"></div>

      <form id="signupForm" class="auth-form">
        <div class="form-group">
          <label for="signupName" class="form-label">Nama Lengkap</label>
          <input type="text" id="signupName" class="form-input" placeholder="Masukkan nama lengkap Anda" required>
        </div>

        <div class="form-group">
          <label for="signupEmail" class="form-label">Alamat Email</label>
          <input type="email" id="signupEmail" class="form-input" placeholder="nama@email.com" required>
        </div>
        
        <div class="form-group">
          <label for="signupPassword" class="form-label">Kata Sandi</label>
          <input type="password" id="signupPassword" class="form-input" placeholder="Minimal 6 karakter" required>
          <div class="password-strength-container">
            <div class="strength-bar" id="strengthBar"></div>
            <span class="strength-text" id="strengthText">Kekuatan Sandi</span>
          </div>
        </div>

        <div class="form-group">
          <label for="signupConfirmPassword" class="form-label">Konfirmasi Kata Sandi</label>
          <input type="password" id="signupConfirmPassword" class="form-input" placeholder="Ulangi kata sandi" required>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="termsCheckbox" required>
          <label for="termsCheckbox" class="checkbox-label">Saya menyetujui syarat dan ketentuan layanan</label>
        </div>

        <button type="submit" id="signupBtn" class="btn-primary btn-full">
          <span class="btn-text">Daftar Sekarang</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <div class="auth-divider">
        <span>atau daftar lewat</span>
      </div>

      <div class="social-login-grid">
        <button type="button" id="googleSignupBtn" class="btn-social">
          Google
        </button>
        <button type="button" id="githubSignupBtn" class="btn-social">
          GitHub
        </button>
      </div>

      <p class="auth-footer-text">
        Sudah punya akun? <a href="login.html" class="auth-link-bold">Masuk</a>
      </p>
    </div>
  </div>

  <div id="toast" class="toast-notification">Pemberitahuan muncul di sini</div>

  <script src="script.js"></script>
</body>
</html>
