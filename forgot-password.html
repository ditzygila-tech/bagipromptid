
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Kata Sandi - bagiprompt.id</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="body-auth">

  <div class="auth-wrapper">
    <a href="index.html" class="logo logo-auth">bagiprompt<span class="logo-accent">.id</span></a>
    
    <div class="glass-card auth-card">
      <h1 class="auth-title">Lupa Kata Sandi?</h1>
      <p class="auth-subtitle">Kami akan mengirimkan instruksi untuk menyetel ulang kata sandi Anda</p>
      
      <div id="errorMessage" class="alert-box alert-danger hidden"></div>
      
      <div id="successCard" class="success-message-wrapper hidden">
        <div class="success-icon-badge">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <p class="success-text">Link penyetelan ulang sandi telah terkirim! Silakan periksa kotak masuk email Anda.</p>
      </div>

      <form id="forgotPasswordForm" class="auth-form">
        <div class="form-group">
          <label for="forgotEmail" class="form-label">Alamat Email Terdaftar</label>
          <input type="email" id="forgotEmail" class="form-input" placeholder="nama@email.com" required>
        </div>

        <button type="submit" id="forgotBtn" class="btn-primary btn-full">
          <span class="btn-text">Kirim Link Reset</span>
          <span class="btn-spinner hidden"></span>
        </button>
      </form>

      <p class="auth-footer-text mt-6">
        <a href="login.html" class="auth-link-bold">Kembali ke halaman masuk</a>
      </p>
    </div>
  </div>

  <div id="toast" class="toast-notification">Pemberitahuan muncul di sini</div>

  <script src="script.js"></script>
</body>
</html>
